<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bảng Xoay Mật Thư - Tự Khớp Ô</title>
    <style>
        :root {
            --line-color: #333;
            --outer-bg: #8dd3c7; 
            --middle-bg: #bebada; 
            --inner-bg: #ffffb3;  
            --base-size: 600px;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #e0e0e0;
            font-family: Arial, sans-serif;
            touch-action: none;
            overflow: hidden;
        }

        .main-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .wheel-stack {
            position: relative;
            width: var(--base-size);
            height: var(--base-size);
            max-width: 90vw;
            max-height: 90vw;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-origin: center center;
            /* Thêm transition để xoay tổng thể mượt hơn */
            transition: transform 0.3s ease-out; 
            will-change: transform;
        }

        .wheel {
            position: absolute;
            border-radius: 50%;
            border: 2px solid var(--line-color);
            cursor: grab;
            box-sizing: border-box;
            transform-origin: center center;
            /* Quan trọng: transition này giúp hiệu ứng "hút" nhìn mượt mà */
            transition: transform 0.2s ease-out;
            will-change: transform;
        }

        .wheel:active { 
            cursor: grabbing; 
            transition: none; /* Khi đang kéo thì không dùng transition để tránh bị trễ */
        }

        .wheel-outer { width: 100%; height: 100%; z-index: 1; background: var(--outer-bg); }
        .wheel-middle { width: 78%; height: 78%; z-index: 2; background: var(--middle-bg); }
        .wheel-inner { width: 56%; height: 56%; z-index: 3; background: var(--inner-bg); }

        .tick {
            position: absolute;
            top: 0; left: 50%;
            width: 2px;
            background-color: var(--line-color);
            height: 50%; 
            transform-origin: bottom center;
            pointer-events: none;
        }

        .label {
            position: absolute;
            left: 50%; width: 40px; margin-left: -20px;
            text-align: center; font-weight: 900;
            color: black; pointer-events: none;
            display: flex; justify-content: center;
        }

        .wheel-outer .label { font-size: 22px; top: 15px; transform-origin: center calc(300px - 20px); }
        .wheel-middle .label { font-size: 20px; top: 15px; transform-origin: center calc(234px - 20px); }
        .wheel-inner .label { font-size: 18px; top: 12px; transform-origin: center calc(168px - 15px); }

        @media (max-width: 600px) {
            .wheel-outer .label { top: 2.5vw; transform-origin: center 42.5vw; font-size: 4vw; }
            .wheel-middle .label { top: 2.5vw; transform-origin: center 32.5vw; font-size: 4vw; }
            .wheel-inner .label { top: 2vw; transform-origin: center 23vw; font-size: 3vw; }
        }

        .center-hole {
            position: absolute;
            width: 12%; height: 12%;
            background: #e0e0e0;
            border: 2px solid var(--line-color);
            border-radius: 50%;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="master" class="main-container">
        <div id="stack" class="wheel-stack">
            <div id="outer" class="wheel wheel-outer"></div>
            <div id="middle" class="wheel wheel-middle"></div>
            <div id="inner" class="wheel wheel-inner"></div>
            <div class="center-hole"></div>
        </div>
    </div>

    <script>
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        const numbers = Array.from({length: 26}, (_, i) => i + 1);
        const STEP = 360 / 26;

        function createRotatable(element, isStack = false) {
            let rotation = 0;
            let startA = 0;
            let isDragging = false;

            const getAngle = (x, y) => {
                const rect = element.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                return Math.atan2(y - cy, x - cx) * 180 / Math.PI;
            };

            const down = (e) => {
                if (isStack && e.target.classList.contains('wheel')) return;
                
                isDragging = true;
                const p = e.touches ? e.touches[0] : e;
                startA = getAngle(p.clientX, p.clientY) - rotation;
                
                // Tắt transition khi bắt đầu kéo để mượt
                element.style.transition = 'none';
                
                if(e.cancelable) e.preventDefault();
            };

            const move = (e) => {
                if (!isDragging) return;
                const p = e.touches ? e.touches[0] : e;
                rotation = getAngle(p.clientX, p.clientY) - startA;
                element.style.transform = `rotate(${rotation}deg)`;
                if(e.cancelable) e.preventDefault();
            };

            const up = () => {
                if (!isDragging) return;
                isDragging = false;

                if (!isStack) {
                    // LOGIC NAM CHÂM: Làm tròn góc xoay về bội số của STEP
                    // giúp các chữ cái luôn nhảy về đúng vị trí trung tâm
                    rotation = Math.round(rotation / STEP) * STEP;
                    
                    // Bật lại transition để hiệu ứng "hút" mượt mà
                    element.style.transition = 'transform 0.2s ease-out';
                    element.style.transform = `rotate(${rotation}deg)`;
                } else {
                    // Nếu là xoay cả bộ thì không cần snap từng nấc, nhưng vẫn bật transition
                    element.style.transition = 'transform 0.3s ease-out';
                }
            };

            if (isStack) {
                const bg = document.getElementById('master');
                bg.addEventListener('mousedown', down);
                window.addEventListener('mousemove', move);
                window.addEventListener('mouseup', up);
                bg.addEventListener('touchstart', down, {passive: false});
                window.addEventListener('touchmove', move, {passive: false});
                window.addEventListener('touchend', up);
            } else {
                element.addEventListener('mousedown', down);
                window.addEventListener('mousemove', move);
                window.addEventListener('mouseup', up);
                element.addEventListener('touchstart', down, {passive: false});
                window.addEventListener('touchmove', move, {passive: false});
                window.addEventListener('touchend', up);
            }
        }

        function renderWheel(id, items) {
            const wheel = document.getElementById(id);
            items.forEach((item, i) => {
                const angle = i * STEP;
                const tick = document.createElement('div');
                tick.className = 'tick';
                tick.style.transform = `rotate(${angle - STEP/2}deg)`;
                wheel.appendChild(tick);

                const label = document.createElement('div');
                label.className = 'label';
                label.innerText = item;
                label.style.transform = `rotate(${angle}deg)`;
                wheel.appendChild(label);
            });
            createRotatable(wheel);
        }

        renderWheel('outer', alphabet);
        renderWheel('middle', alphabet);
        renderWheel('inner', numbers);

        createRotatable(document.getElementById('stack'), true);

    </script>
</body>
</html>
