<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cipher Wheel Pro - iOS Fix</title>
    <style>
        :root {
            --line-color: rgba(255, 255, 255, 0.3);
            --outer-bg: rgba(141, 211, 199, 0.6); 
            --middle-bg: rgba(190, 186, 218, 0.6); 
            --inner-bg: rgba(255, 255, 179, 0.7);
            --base-size: 600px;
            --sidebar-width: 80px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            display: flex;
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
            touch-action: none;
        }

        /* --- DECORATION --- */
        .bg-blob {
            position: absolute;
            width: 300px; height: 300px;
            background: linear-gradient(135deg, #ff0080, #7928ca);
            filter: blur(80px);
            border-radius: 50%;
            z-index: 0;
            opacity: 0.4;
            pointer-events: none;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-width);
            height: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            z-index: 100;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-item {
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            padding: 20px 10px;
            margin: 15px 0;
            font-size: 0.9rem;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            border-right: 3px solid transparent;
            white-space: nowrap;
        }

        .menu-item.active { color: #00d2fc; border-right: 3px solid #00d2fc; }

        /* --- MENU TOGGLE --- */
        .menu-toggle {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 200;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.3s ease, visibility 0.3s;
        }

        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .sidebar {
                position: fixed;
                left: 0;
                transform: translateX(-100%);
            }
            .sidebar.open { transform: translateX(0); }
            .sidebar.open ~ .menu-toggle { opacity: 0; visibility: hidden; }
        }

        /* --- KHU VỰC CHÍNH --- */
        .main-content {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            cursor: pointer; /* Cho phép iOS nhận diện chạm vùng nền */
        }

        .wheel-stack {
            position: relative;
            width: var(--base-size); height: var(--base-size);
            max-width: 85vw; max-height: 85vw;
            display: flex; justify-content: center; align-items: center;
            transition: transform 0.3s ease-out;
            cursor: default; /* Trả về cursor mặc định cho bảng xoay */
        }

        .wheel {
            position: absolute; border-radius: 50%; border: 1px solid var(--line-color);
            cursor: grab; box-sizing: border-box; transform-origin: center center;
            transition: transform 0.2s ease-out; backdrop-filter: blur(8px);
        }

        .wheel-outer { width: 100%; height: 100%; z-index: 1; background: var(--outer-bg); }
        .wheel-middle { width: 78%; height: 78%; z-index: 2; background: var(--middle-bg); }
        .wheel-inner { width: 56%; height: 56%; z-index: 3; background: var(--inner-bg); }

        .tick { position: absolute; top: 0; left: 50%; width: 1px; background-color: var(--line-color); height: 50%; transform-origin: bottom center; pointer-events: none; }
        .label { position: absolute; left: 50%; width: 40px; margin-left: -20px; text-align: center; font-weight: 900; color: #000; pointer-events: none; display: flex; justify-content: center; }

        .wheel-outer .label { font-size: 22px; top: 15px; transform-origin: center calc(300px - 20px); }
        .wheel-middle .label { font-size: 20px; top: 15px; transform-origin: center calc(234px - 20px); }
        .wheel-inner .label { font-size: 18px; top: 12px; transform-origin: center calc(168px - 15px); }

        @media (max-width: 650px) {
            .wheel-outer .label { top: 2.5vw; transform-origin: center 40vw; font-size: 4vw; }
            .wheel-middle .label { top: 2.5vw; transform-origin: center 31vw; font-size: 4vw; }
            .wheel-inner .label { top: 2.5vw; transform-origin: center 21vw; font-size: 2.5vw; }
        }

        .center-hole { position: absolute; width: 12%; height: 12%; background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); border: 2px solid var(--line-color); border-radius: 50%; z-index: 10; }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="menu-item active">BẢNG XOAY</div>
        <div class="menu-item" onclick="window.location.href='morse.html'">MORSE</div>
        <div class="menu-item">CÀI ĐẶT</div>
    </aside>

    <button class="menu-toggle" id="menuToggle">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>

    <main class="main-content" id="mainContent">
        <div id="stack" class="wheel-stack" onclick="event.stopPropagation()" ontouchstart="event.stopPropagation()">
            <div id="outer" class="wheel wheel-outer"></div>
            <div id="middle" class="wheel wheel-middle"></div>
            <div id="inner" class="wheel wheel-inner"></div>
            <div class="center-hole"></div>
        </div>
    </main>

    <script>
        // --- LOGIC MENU (GIỐNG MORSE.HTML) ---
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');

        const openMenu = (e) => {
            sidebar.classList.add('open');
            e.stopPropagation();
        };

        const closeMenu = () => {
            if (sidebar.classList.contains('open')) {
                sidebar.classList.remove('open');
            }
        };

        menuToggle.addEventListener('click', openMenu);
        mainContent.addEventListener('click', closeMenu);
        mainContent.addEventListener('touchstart', closeMenu, { passive: true });

        // --- LOGIC BẢNG XOAY ---
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        const numbers = Array.from({length: 26}, (_, i) => i + 1);
        const STEP = 360 / 26;

        function createRotatable(element, isStack = false) {
            let rotation = 0; let startA = 0; let isDragging = false;
            
            const getAngle = (x, y) => {
                const rect = element.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                return Math.atan2(y - centerY, x - centerX) * 180 / Math.PI;
            };

            const down = (e) => {
                // Không cho xoay nếu menu đang mở
                if (sidebar.classList.contains('open')) return;

                if (isStack && e.target.classList.contains('wheel')) return;
                isDragging = true;
                const p = e.touches ? e.touches[0] : e;
                startA = getAngle(p.clientX, p.clientY) - rotation;
                element.style.transition = 'none';
                if(e.cancelable) e.preventDefault();
            };

            const move = (e) => {
                if (!isDragging) return;
                const p = e.touches ? e.touches[0] : e;
                rotation = getAngle(p.clientX, p.clientY) - startA;
                element.style.transform = `rotate(${rotation}deg)`;
            };

            const up = () => {
                if (!isDragging) return;
                isDragging = false;
                if (!isStack) {
                    rotation = Math.round(rotation / STEP) * STEP;
                    element.style.transition = 'transform 0.2s ease-out';
                    element.style.transform = `rotate(${rotation}deg)`;
                } else {
                    element.style.transition = 'transform 0.3s ease-out';
                }
            };
            
            const target = isStack ? mainContent : element;
            target.addEventListener('mousedown', down);
            window.addEventListener('mousemove', move);
            window.addEventListener('mouseup', up);
            target.addEventListener('touchstart', down, {passive: false});
            window.addEventListener('touchmove', move, {passive: false});
            window.addEventListener('touchend', up);
        }

        function renderWheel(id, items) {
            const wheel = document.getElementById(id);
            items.forEach((item, i) => {
                const angle = i * STEP;
                const tick = document.createElement('div');
                tick.className = 'tick';
                tick.style.transform = `rotate(${angle - STEP/2}deg)`;
                wheel.appendChild(tick);
                const label = document.createElement('div');
                label.className = 'label'; label.innerText = item;
                label.style.transform = `rotate(${angle}deg)`;
                wheel.appendChild(label);
            });
            createRotatable(wheel);
        }

        renderWheel('outer', alphabet);
        renderWheel('middle', alphabet);
        renderWheel('inner', numbers);
        createRotatable(document.getElementById('stack'), true);
    </script>
</body>
</html>
