<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bảng Xoay Mật Thư</title>
    <style>
        :root {
            --line-color: #333;
            --outer-bg: #8dd3c7; 
            --middle-bg: #bebada; /* Đổi màu vòng chữ cái thứ 2 */
            --inner-bg: #ffffb3;  /* Đổi màu vòng số */
            --base-size: 600px;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #e0e0e0;
            font-family: Arial, sans-serif;
            touch-action: none;
            overflow: hidden;
        }

        .main-container {
            position: relative;
            width: var(--base-size);
            height: var(--base-size);
            display: flex;
            justify-content: center;
            align-items: center;
            max-width: 95vw;
            max-height: 95vw;
        }

        .wheel {
            position: absolute;
            border-radius: 50%;
            border: 2px solid var(--line-color);
            cursor: grab;
            box-sizing: border-box;
            transform-origin: center center;
            will-change: transform;
        }

        .wheel:active { cursor: grabbing; }

        .wheel-outer { width: 100%; height: 100%; z-index: 1; background: var(--outer-bg); }
        .wheel-middle { width: 78%; height: 78%; z-index: 2; background: var(--middle-bg); }
        .wheel-inner { width: 56%; height: 56%; z-index: 3; background: var(--inner-bg); }

        .tick {
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            background-color: var(--line-color);
            height: 50%; 
            transform-origin: bottom center;
            pointer-events: none;
        }

        .label {
            position: absolute;
            left: 50%;
            width: 40px;
            margin-left: -20px;
            text-align: center;
            font-weight: 900;
            color: black;
            pointer-events: none;
            display: flex;
            justify-content: center;
        }

        /* Vòng ngoài (Chữ cái) */
        .wheel-outer .label { 
            font-size: 22px; 
            top: 15px; 
            transform-origin: center calc(300px - 20px); 
        }

        /* Vòng giữa (Chữ cái) */
        .wheel-middle .label { 
            font-size: 20px; 
            top: 15px; 
            transform-origin: center calc(234px - 20px); 
        }

        /* Vòng trong cùng (Số) */
        .wheel-inner .label { 
            font-size: 18px; 
            top: 12px; 
            transform-origin: center calc(168px - 15px); 
        }

        @media (max-width: 600px) {
            :root { --base-size: 90vw; }
            .wheel-outer .label { top: 2.5vw; transform-origin: center 42.5vw; font-size: 4vw; }
            .wheel-middle .label { top: 2.5vw; transform-origin: center 32.5vw; font-size: 4vw; }
            .wheel-inner .label { top: 2vw; transform-origin: center 23vw; font-size: 2.5vw; }
        }

        .center-hole {
            position: absolute;
            width: 12%;
            height: 12%;
            background: #e0e0e0;
            border: 2px solid var(--line-color);
            border-radius: 50%;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div id="outer" class="wheel wheel-outer"></div>
        <div id="middle" class="wheel wheel-middle"></div>
        <div id="inner" class="wheel wheel-inner"></div>
        <div class="center-hole"></div>
    </div>

    <script>
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        const numbers = Array.from({length: 26}, (_, i) => i + 1);

        function renderWheel(id, items) {
            const wheel = document.getElementById(id);
            const step = 360 / 26;

            items.forEach((item, i) => {
                const angle = i * step;
                
                const tick = document.createElement('div');
                tick.className = 'tick';
                tick.style.transform = `rotate(${angle - step/2}deg)`;
                wheel.appendChild(tick);

                const label = document.createElement('div');
                label.className = 'label';
                label.innerText = item;
                label.style.transform = `rotate(${angle}deg)`;
                wheel.appendChild(label);
            });

            let currentRotation = 0;
            let startAngle = 0;
            let dragging = false;

            const getAngle = (x, y) => {
                const rect = wheel.getBoundingClientRect();
                return Math.atan2(y - (rect.top + rect.height/2), x - (rect.left + rect.width/2)) * 180 / Math.PI;
            };

            const start = (e) => {
                dragging = true;
                const p = e.touches ? e.touches[0] : e;
                startAngle = getAngle(p.clientX, p.clientY) - currentRotation;
                if(e.type === 'touchstart') e.preventDefault();
            };

            const move = (e) => {
                if (!dragging) return;
                const p = e.touches ? e.touches[0] : e;
                currentRotation = getAngle(p.clientX, p.clientY) - startAngle;
                wheel.style.transform = `rotate(${currentRotation}deg)`;
                if(e.type === 'touchmove') e.preventDefault();
            };

            const end = () => dragging = false;

            wheel.addEventListener('mousedown', start);
            window.addEventListener('mousemove', move);
            window.addEventListener('mouseup', end);
            wheel.addEventListener('touchstart', start, {passive: false});
            window.addEventListener('touchmove', move, {passive: false});
            window.addEventListener('touchend', end);
        }

        // Thứ tự render mới: Ngoài (Chữ), Giữa (Chữ), Trong (Số)
        renderWheel('outer', alphabet);
        renderWheel('middle', alphabet);
        renderWheel('inner', numbers);
    </script>
</body>
</html>
